<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Explora Guate</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
     <header>
    <a href="#" class="logo">🌍 Explora Guate</a>


    <nav>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#destinos">Destinos</a></li>
      </ul>
    </nav>
  </header>
  
  <main> 
    <section class="hero" aria-label="Bienvenida">

      <img
        class="hero-bg"
        src="imagen/turismoGT.jpg"
        alt="Collage de destinos turísticos de Guatemala"
      />

      <div class="hero-content">
            <h1 class="hero-title">
          Excursiones y tours<br>por Guatemala
        </h1>
      </div>
    </section>
    
     <section class="seccion-destinos" id="destinos">

      <h2 class="section-title">Principales destinos</h2>

      <div class="destinos-grid">

        <article>
          <a class="destino-card">
            <img src="imagen/antigua.jpg" alt="Vista aérea de Antigua Guatemala con el Volcán de Agua al fondo" />
            <span class="destino-nombre">Antigua Guatemala</span>
          </a>
        </article>

        <article>
          <a class="destino-card">
            <img src="imagen/atitlan.webp" alt="Muelle del Lago de Atitlán con volcanes al fondo" />
            <span class="destino-nombre">Lago de Atitlán</span>
          </a>
        </article>

        <article>
          <a class="destino-card">
            <img src="imagen/cenotes.jpg" alt="Cenote de Candelaria en Huehuetenango, Guatemala" />
            <span class="destino-nombre">Cenotes de Candelaria</span>
          </a>
        </article>

        <article>
          <a class="destino-card">
            <img src="imagen/esquipulas.jpg" alt="Basílica blanca de Esquipulas rodeada de palmeras" />
            <span class="destino-nombre">Esquipulas</span>
          </a>
        </article>

       
        <article>
          <a class="destino-card">
            <img src="imagen/sumpango.jpg" alt="Festival de barriletes gigantes de Sumpango" />
            <span class="destino-nombre">Sumpango</span>
          </a>
        </article>

        <article>
          <a class="destino-card">
            <img src="imagen/tikal.webp" alt="Ruinas mayas de Tikal con templos de piedra y selva" />
            <span class="destino-nombre">Tikal</span>
          </a>
        </article>

      </div>

    </section>

</body>
</html>
